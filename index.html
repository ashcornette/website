<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ash Cornette</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Ash Cornette</h1>
      <p class="role">performing artist &amp; UX/UI designer</p>

      <div class="bio">
        <p>
          Based in Vancouver, BC. 27 years in breaking —
          now&nbsp;evolving into UX/UI design.
        </p>
        <p>
          Dancer at OURO Collective. Currently studying UX/UI Design
          at&nbsp;Emily Carr University.
        </p>
      </div>

      <div class="component-row">
        <div class="button-demo">
          <p class="label"></p>
          <button class="pill" data-state="default">Button</button>
          <p class="state-tag">Default</p>
        </div>

        <div class="toggle-demo">
          <label class="toggle">
            <input type="checkbox" class="toggle-input" />
            <span class="toggle-track">
              <span class="toggle-knob"></span>
            </span>
            <span class="toggle-label">Toggle</span>
          </label>
          <p class="state-tag toggle-state-tag">Off</p>
        </div>
      </div>
    </main>

    <script>
      const states = ['default', 'hover', 'clicked', 'focused', 'ghost', 'disabled'];
      const labels = ['Default', 'Hover', 'Clicked', 'Focused', 'Ghost', 'Disabled'];
      let i = 0;
      const btn = document.querySelector('.pill');
      const tag = document.querySelector('.state-tag');
      btn.addEventListener('click', () => {
        i = (i + 1) % states.length;
        btn.dataset.state = states[i];
        tag.textContent = labels[i];
      });

      const toggleInput = document.querySelector('.toggle-input');
      const toggleTag = document.querySelector('.toggle-state-tag');
      toggleInput.addEventListener('change', () => {
        toggleTag.textContent = toggleInput.checked ? 'On' : 'Off';
      });
    </script>

    <footer>
      <a href="projects.html">projects</a>
      <a href="mailto:hello@ashcornette.com">hello@ashcornette.com</a>
      <a href="https://linkedin.com/in/ashcornette" target="_blank" rel="noopener noreferrer">linkedin</a>
    </footer>
  </body>
</html>
