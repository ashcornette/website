<script>
/* ---- Part 1: General Questions — the intake, in Ash's voice. One page. ---- */
const QUESTIONS = [
  /* group:'contact' renders as a compact row at the top and is the only
     required part — without it an inquiry arrives with no way to reply. */
  { id:'firstname', type:'text',  group:'contact', required:true, q:'First name', placeholder:'' },
  { id:'lastname',  type:'text',  group:'contact', required:true, q:'Last name',  placeholder:'' },
  { id:'email',     type:'email', group:'contact', required:true, q:'Email',      placeholder:'you@company.com' },

  { id:'problem', type:'textarea', q:'What problem or opportunity led you here?',
    placeholder:'A sentence or two is plenty.' },

  { id:'found', type:'single', q:'How did you find me?', options:[
    {v:'referral', label:'A referral'},
    {v:'search',   label:'Search'},
    {v:'social',   label:'Social'},
    {v:'work',     label:'Saw my work'},
    {v:'other',    label:'Somewhere else'},
  ]},

  { id:'services', type:'multi', q:'What are you looking for?', hint:'Pick any that apply.', options:[
    {v:'ux',      label:'UX & product design'},
    {v:'web',     label:'Website design & build'},
    {v:'systems', label:'Design systems & accessibility'},
    {v:'brand',   label:'Brand & logo'},
    {v:'other',   label:'Something else'},
  ]},

  { id:'scope', type:'textarea', q:'What pieces do you need made — and what are they for?',
    placeholder:'e.g. a portfolio site, a logo and type system, a booking flow…' },

  { id:'stakeholders', type:'text', q:'Who has the final say?',
    placeholder:'Just you, or a few people?' },

  { id:'timeline', type:'single', q:'What’s the timeline?', options:[
    {v:'asap', label:'As soon as possible'},
    {v:'1-3',  label:'1–3 months'},
    {v:'3-6',  label:'3–6 months'},
    {v:'flex', label:'Flexible'},
  ]},

  { id:'budget', type:'single', q:'Budget — a rough range is fine.', options:[
    {v:'u4',     label:'Under $4k'},
    {v:'4-7',    label:'$4k–$7k'},
    {v:'7-10',   label:'$7k–$10k'},
    {v:'10+',    label:'$10k+'},
    {v:'unsure', label:'Not sure yet'},
  ]},

  { id:'outcome', type:'textarea', q:'What does success look like to you?',
    placeholder:'How you’ll know this worked.' },
];

const answers = {};   // text: string · single: value · multi: array

/* label lookup for the email */
function labelFor(id, v){
  const item = QUESTIONS.find(q => q.id === id);
  if (!item || !item.options) return v;
  const opt = item.options.find(o => o.v === v);
  return opt ? opt.label : v;
}

/* ---- One control renderer per question ---- */
function controlHTML(item){
  if (item.type === 'textarea'){
    return `<div class="field"><textarea class="in" data-id="${item.id}" rows="4" placeholder="${item.placeholder||''}">${answers[item.id]||''}</textarea></div>`;
  }
  if (item.type === 'text' || item.type === 'email'){
    const val = (answers[item.id]||'').replace(/"/g,'&quot;');
    const auto = item.id==='firstname' ? 'given-name' : item.id==='lastname' ? 'family-name' : item.id==='email' ? 'email' : 'off';
    return `<div class="field"><input class="in" data-id="${item.id}" id="f-${item.id}" type="${item.type}" autocomplete="${auto}"${item.required?' required aria-required="true"':''} placeholder="${item.placeholder||''}" value="${val}"></div>`;
  }
  const chosen = item.type === 'multi' ? (answers[item.id]||[]) : answers[item.id];
  return `
    ${item.hint ? `<p class="hint">${item.hint}</p>` : ''}
    <div class="opts" data-id="${item.id}" data-type="${item.type}" role="group" aria-label="${item.q}">
      ${item.options.map(o=>{
        const on = item.type==='multi' ? chosen.includes(o.v) : chosen===o.v;
        return `<button class="opt" data-v="${o.v}" aria-pressed="${on}"><span>${o.label}</span><span class="arr" aria-hidden="true">${item.type==='multi'?'+':'→'}</span></button>`;
      }).join('')}
    </div>`;
}

function bindControls(scope){
  scope.querySelectorAll('.in').forEach(inp=>{
    inp.addEventListener('input', ()=>{ answers[inp.dataset.id] = inp.value; });
  });
  scope.querySelectorAll('.opts').forEach(group=>{
    const id = group.dataset.id, type = group.dataset.type;
    group.querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const v = btn.dataset.v;
        if (type === 'multi'){
          const arr = answers[id] || (answers[id] = []);
          const at = arr.indexOf(v);
          if (at === -1) arr.push(v); else arr.splice(at,1);
          btn.setAttribute('aria-pressed', at === -1);
        } else {
          answers[id] = v;
          group.querySelectorAll('.opt').forEach(b=>b.setAttribute('aria-pressed', b===btn));
        }
      });
    });
  });
}

/* which questions were actually answered */
function answered(){
  return QUESTIONS.filter(item=>{
    const a = answers[item.id];
    if (Array.isArray(a)) return a.length > 0;
    return a && String(a).trim() !== '';
  });
}

function answerText(item){
  const a = answers[item.id];
  if (Array.isArray(a)) return a.map(v=>labelFor(item.id, v)).join(', ');
  if (item.options) return labelFor(item.id, a);
  return String(a).trim();
}

function buildMailto(){
  const name  = [(answers.firstname||'').trim(), (answers.lastname||'').trim()].filter(Boolean).join(' ');
  const email = (answers.email||'').trim();

  const lines = ['Hi Ash,', ''];
  if (name)  lines.push(`I’m ${name}.`);
  if (email) lines.push(`You can reach me at ${email}.`);
  if (name || email) lines.push('');
  lines.push('Here’s a bit about my project:', '');

  // the contact block is stated above — don't repeat it as Q&A
  answered().filter(item => item.group !== 'contact').forEach(item=>{
    lines.push(`- ${item.q}`);
    lines.push(`  ${answerText(item)}`);
    lines.push('');
  });
  lines.push('Looking forward to next steps.', '', name ? `Thanks!\r\n${name}` : 'Thanks!');

  const subject = name ? `Project inquiry — ${name}` : 'Project inquiry';
  return `mailto:hello@ashcornette.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines.join('\r\n'))}`;
}

/* ---- Render the whole intake, once ---- */
const app = document.getElementById('app');

const CONTACT = QUESTIONS.filter(q => q.group === 'contact');
const REST    = QUESTIONS.filter(q => q.group !== 'contact');

/* wipe every answer and rebuild the form empty */
function resetForm(){
  Object.keys(answers).forEach(k => delete answers[k]);
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function render(){
  app.innerHTML = `
    <div class="review">
      <div class="intake-contact">
        <div class="contact-grid">
          ${CONTACT.map(item=>`
            <div class="review-item">
              <label class="recap-q" for="f-${item.id}">${item.q}</label>
              ${controlHTML(item)}
            </div>`).join('')}
        </div>
        <p class="intake-err" id="intakeErr" role="alert" hidden></p>
      </div>

      ${REST.map(item=>`
        <div class="review-item">
          <p class="recap-q">${item.q}</p>
          ${controlHTML(item)}
        </div>`).join('')}
    </div>

    <div class="cta">
      <p class="lab">Next step</p>
      <p>Send this over and I’ll turn it into a proposal — scope, timeline, and cost. We start with a one-hour discovery call, in person or over Google Meet.</p>
      <a class="pill" href="#">Send my answers →</a>
    </div>`;

  bindControls(app);
  const send = app.querySelector('.cta a');
  const err  = app.querySelector('#intakeErr');
  // href stays "#" until the click handler validates and builds it. Setting it
  // up front left a stale mailto with an empty body on the link, which a
  // middle-click or ⌘-click would open — bypassing validation entirely.

  send.addEventListener('click', function(e){
    // contact details are the one hard requirement — an inquiry with no name
    // or address is one Ash can receive but never answer
    const missing = CONTACT.filter(i => !(answers[i.id]||'').trim()).map(i => i.q.toLowerCase());
    const mail = (answers.email||'').trim();
    const badEmail = mail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(mail);

    if (missing.length || badEmail){
      e.preventDefault();
      // 1 → "email" · 2 → "last name and email" · 3 → "first name, last name, and email"
      const list = missing.length < 2 ? missing[0]
                 : missing.length === 2 ? missing.join(' and ')
                 : missing.slice(0, -1).join(', ') + ', and ' + missing[missing.length - 1];
      err.textContent = missing.length
        ? `Please add your ${list} so I can reply.`
        : 'That email doesn’t look right — mind checking it?';
      err.hidden = false;
      const first = app.querySelector(missing.length ? `#f-${CONTACT.find(i=>!(answers[i.id]||'').trim()).id}` : '#f-email');
      if (first) first.focus();
      return;
    }

    err.hidden = true;

    // The link's own href does the navigating — no preventDefault, no
    // location assignment. Keeps it a real mailto link: right-click, copy
    // address, middle-click and open-in-new-tab all behave normally.
    this.href = buildMailto();

    // human labels, not option codes — "$7k–$10k" reads where "7-10" doesn't
    const payload = { source: 'inquiry' };
    answered().forEach(function(item){
      payload[item.id] = item.group === 'contact' ? answers[item.id] : answerText(item);
    });

    // best-effort copy to the Worker (a log, not the delivery path)
    window.ashPost(payload).catch(function(){});

    // a mailto only opens a draft, so we can't confirm it was sent — which is
    // why the answers stay put and nothing auto-redirects
    window.ashAck({
      title: 'Thank you.',
      // closing the popup is a deliberate "I'm done here" — send them back to
      // the work. Only on this page: the contact panel's popup leaves you
      // wherever you were reading.
      onClose: function(){ window.location.href = 'index.html'; }
    });
  });
}

render();
</script>

  // theme toggle — inlined (matches index/sean-dawn; no external theme.js in this folder)
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById('themeToggle');

      var cur = root.dataset.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); var next = cur === 'dark' ? 'light' : 'dark'; root.dataset.theme = next; try { localStorage.setItem('theme', next); } catch (e) {}
    });
  })();
  // footer year
  document.getElementById('yr').textContent = new Date().getFullYear();
</script>
