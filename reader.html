<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader — Ash Cornette</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .reader {
        width: 100%;
        max-width: 720px;
        aspect-ratio: 2 / 1;
        border: 1px solid var(--text);
        border-radius: 4px;
        position: relative;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        background: var(--bg);
        cursor: pointer;
        margin-bottom: 12px;
        --slot-width: 240px;
      }

      .reader:focus-visible {
        outline: 2px dashed var(--accent);
        outline-offset: 3px;
      }

      .reader-track {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        display: flex;
        will-change: transform;
        transform: translateX(0);
        transition: transform 0.35s ease;
      }

      .reader-slot {
        width: var(--slot-width);
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 120px;
        color: var(--text);
        flex: 0 0 auto;
      }

      .reader-hint {
        font-size: 12px;
        color: var(--muted);
        font-style: italic;
        margin-bottom: 48px;
      }

      @media screen and (max-width: 600px) {
        .reader-slot {
          font-size: 80px;
        }
      }

      @media screen and (max-width: 380px) {
        .reader-slot {
          font-size: 64px;
        }
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back">← Ash Cornette</a>

    <main>
      <h2>Reader</h2>

      <div
        class="reader"
        id="reader"
        role="button"
        tabindex="0"
        aria-label="Tap to reveal the next letter"
      >
        <div class="reader-track" id="track"></div>
      </div>
      <p class="reader-hint">Tap the box to reveal each letter.</p>
    </main>

    <footer>
      <a href="index.html">home</a>
      <a href="mailto:hello@ashcornette.com">hello@ashcornette.com</a>
      <a href="https://linkedin.com/in/ashcornette" target="_blank" rel="noopener noreferrer">linkedin</a>
    </footer>

    <script>
      (function () {
        const reader = document.getElementById("reader");
        const track = document.getElementById("track");
        const message = "Hello World!";
        const totalSlots = message.length + 1;

        let index = 0;

        function buildSlots() {
          track.innerHTML = "";
          const empty = document.createElement("div");
          empty.className = "reader-slot";
          empty.textContent = "\u00A0";
          track.appendChild(empty);
          for (const ch of message) {
            const slot = document.createElement("div");
            slot.className = "reader-slot";
            slot.textContent = ch === " " ? "\u00A0" : ch;
            track.appendChild(slot);
          }
        }

        function measure() {
          reader.style.setProperty(
            "--slot-width",
            reader.clientWidth + "px"
          );
        }

        function render() {
          track.style.transform =
            "translateX(" + -index * reader.clientWidth + "px)";
        }

        function advance() {
          index = (index + 1) % totalSlots;
          render();
        }

        buildSlots();
        measure();
        render();

        reader.addEventListener("click", advance);
        reader.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            advance();
          }
        });

        window.addEventListener("resize", function () {
          measure();
          render();
        });
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            measure();
            render();
          });
        }
      })();
    </script>
  </body>
</html>
